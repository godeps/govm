name: test

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: go test ./...
      - name: Doctor JSON
        run: go run ./cmd/govm-doctor --json
      - name: Platform Asset Check (warn mode)
        run: make platform-check
